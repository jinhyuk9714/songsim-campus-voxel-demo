#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
file_opener = "vscode"
project_doc_max_bytes = 16384
model_instructions_file = "../docs/codex/MASTER_PROMPT.md"

[features]
multi_agent = true
child_agents_md = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer that maps the current architecture, scene graph, and file ownership boundaries."
config_file = "agents/explorer.toml"

[agents.layout_planner]
description = "Read-heavy planner that checks Songsim campus landmark placement, route ordering, and spatial coherence before edits."
config_file = "agents/layout-planner.toml"

[agents.world_builder]
description = "Implementation-focused worker for terrain, roads, buildings, and visual polish. Should own one file boundary at a time."
config_file = "agents/world-builder.toml"

[agents.interaction_builder]
description = "Implementation-focused worker for camera behavior, HUD, picking, and user interactions."
config_file = "agents/interaction-builder.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, layout regressions, controls, and missing validation."
config_file = "agents/reviewer.toml"
